# Supabase Configuration for Vita: AI Wellness Coach

[project]
project_id = "vita-project"

[api]
# Port for local development
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
major_version = 15
seed_file_path = ""

[realtime]
enabled = true
max_bytes_per_second = 1048576
max_concurrent_users = 200
max_joins_per_second = 100
max_events_per_second = 2048
max_downstream_msg_size = 200000

[studio]
enabled = true
port = 54680
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:8000",
  "http://localhost:8001",
  "http://localhost:8002",
  "https://vita.app/*",
]
jwt_expiry_seconds = 3600
enable_signup = true
enable_anonymous_signups = false
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_email_autoconfirm = false
enable_email_confirmation_signup = true
enable_phone_autoconfirm = false
enable_phone_confirmation_signup = false

[auth.email]
enable_signup = true
enable_confirmations = true
rate_limit_token_sent = 180
rate_limit_token_verified = 180
enable_recovery_code = true
double_confirm_changes = true
enable_lark = false
enable_apple = true
enable_google = true

[functions]
# Memory and timeout settings for Edge Functions
memory_mb = 1024
timeout_sec = 60
verify_jwt = true

[realtime.presence]
max_event_channels = 128
max_presence_subscriptions = 512

[storage]
file_size_limit = 52428800
s3_host = "http://localhost:54321"
s3_protocol = "http"
s3_force_path_style = true
