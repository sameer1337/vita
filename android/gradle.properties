org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Djava.net.preferIPv4Stack=true -Djava.net.preferIPv6Addresses=false
# Flaky/slow network: be patient with slow-but-alive downloads (10 min read)
# so big jars from dl.google.com finish instead of being cut off mid-transfer.
systemProp.org.gradle.internal.http.connectionTimeout=120000
systemProp.org.gradle.internal.http.socketTimeout=600000
# Project is on D:\ but the pub cache (plugin sources) is on C:\. Kotlin's
# incremental compiler can't relativize paths across drives and crashes
# ("different roots"). Disable incremental Kotlin compilation to avoid it.
kotlin.incremental=false
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
