<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Vita is your AI wellness coach — personalized workouts, nutrition, hydration and mindfulness in one calm app.">
  <meta name="theme-color" content="#14201B">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vita">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Vita — AI Wellness Coach</title>
  <link rel="manifest" href="manifest.json">

  <!-- Passkeys Web SDK (bundled by supabase_flutter's auth dependency) -->
  <script src="passkeys.js" defer></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #14201B; }
    /* Branded splash shown until Flutter paints over it. */
    #vita-splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #14201B;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: opacity .4s ease;
    }
    #vita-splash .logo { font-size: 56px; line-height: 1; }
    #vita-splash .name {
      margin-top: 14px; color: #fff; font-size: 26px; font-weight: 800;
      letter-spacing: .5px;
    }
    #vita-splash .tag { margin-top: 6px; color: #9CC3B2; font-size: 14px; }
    #vita-splash .ring {
      margin-top: 28px; width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid rgba(156,195,178,.25); border-top-color: #6B9080;
      animation: vita-spin 1s linear infinite;
    }
    @keyframes vita-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="vita-splash">
    <div class="logo">🌱</div>
    <div class="name">Vita</div>
    <div class="tag">AI Wellness Coach</div>
    <div class="ring"></div>
  </div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Fade out the splash once Flutter's first frame is on screen.
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('vita-splash');
      if (!s) return;
      s.style.opacity = '0';
      setTimeout(function () { s.remove(); }, 450);
    });
  </script>
</body>
</html>
